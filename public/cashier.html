<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>แคชเชียร์</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--surface:#18181b;--surface2:#27272a;--surface3:#3f3f46;
  --border:#27272a;--border2:#3f3f46;
  --text:#fafafa;--muted:#a1a1aa;--muted2:#71717a;
  --green:#4ade80;--green-dim:rgba(74,222,128,0.1);--green-border:rgba(74,222,128,0.2);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.1);--amber-border:rgba(251,191,36,0.2);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.1);--blue-border:rgba(96,165,250,0.2);
  --red:#f87171;--red-dim:rgba(248,113,113,0.1);--red-border:rgba(248,113,113,0.2);
  --r:10px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px;display:flex;flex-direction:column}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{font-family:'Kanit',sans-serif;font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.export-btn{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green);border-radius:8px;padding:7px 14px;font-family:'Kanit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
.export-btn:hover{background:rgba(74,222,128,.2)}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px;flex-shrink:0}
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
.s-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.s-num{font-family:'Kanit',sans-serif;font-size:22px;font-weight:600}
.s-num.amber{color:var(--amber)}
.s-num.blue{color:var(--blue)}
.s-num.green{color:var(--green)}

.tables-scroll{flex:1;overflow-y:auto;padding:0 16px 16px}
.tables-scroll::-webkit-scrollbar{display:none}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.tc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tc-name{font-family:'Kanit',sans-serif;font-size:18px;font-weight:600}
.tc-badge{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:500}
.tc-badge.pending{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)}
.tc-badge.cooking{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border)}
.tc-badge.ready{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.tc-orders{border-top:1px solid var(--border);padding-top:10px;margin-top:2px}
.order-block{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.order-block:last-child{border:none;margin-bottom:0;padding-bottom:0}
.ob-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ob-num{font-size:12px;color:var(--muted2)}
.ob-status{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:500}
.ob-item{display:flex;justify-content:space-between;font-size:14px;padding:2px 0;color:var(--text)}
.ob-qty{color:var(--muted);font-size:13px}
.ob-note{font-size:12px;color:var(--amber);margin-top:4px}
.tc-actions{display:flex;gap:8px;margin-top:12px}
.tc-btn{flex:1;padding:11px;border-radius:10px;border:none;font-family:'Kanit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:center}
.tc-btn.clear{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red)}
.tc-btn.clear:hover{background:rgba(248,113,113,.2)}
.no-tables{text-align:center;padding:80px 20px;color:var(--muted2);font-size:14px}
.no-tables-icon{font-size:52px;margin-bottom:16px;opacity:.3}

.toolbar{padding:0 16px 10px;flex-shrink:0}
.search-box{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text);outline:none}
.search-box::placeholder{color:var(--muted2)}
.search-box:focus{border-color:var(--border2)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><div class="live-dot"></div>💰 แคชเชียร์</div>
  <button class="export-btn" onclick="exportExcel()">📊 สรุปยอดวันนี้</button>
</div>

<div class="summary">
  <div class="s-card"><div class="s-label">โต๊ะเปิดอยู่</div><div class="s-num" id="s-tables">0</div></div>
  <div class="s-card"><div class="s-label">ออเดอร์รอ/ทำ</div><div class="s-num amber" id="s-pending">0</div></div>
  <div class="s-card"><div class="s-label">เสร็จแล้ว</div><div class="s-num green" id="s-done">0</div></div>
</div>

<div class="toolbar">
  <input class="search-box" id="search" placeholder="🔍 ค้นหาโต๊ะ..." oninput="renderTables()">
</div>

<div class="tables-scroll" id="tables-scroll">
  <div class="no-tables"><div class="no-tables-icon">🧾</div>ยังไม่มีโต๊ะที่เปิดอยู่</div>
</div>

<script>
let tickets = [];
let ws;

function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onclose=()=>setTimeout(connect,2000);
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='init'){tickets=msg.tickets;renderTables();}
    if(msg.type==='ticket_added'){tickets.unshift(msg.ticket);renderTables();}
    if(msg.type==='ticket_updated'){const i=tickets.findIndex(t=>t.num===msg.ticket.num);if(i>=0)tickets[i]=msg.ticket;renderTables();}
    if(msg.type==='ticket_deleted'){tickets=tickets.filter(t=>t.num!==msg.num);renderTables();}
    if(msg.type==='table_cleared'){tickets.forEach(t=>{if(t.table===msg.table)t.tableCleared=true;});renderTables();}
  };
}

function getTableStatus(list){
  if(list.some(t=>t.status==='new'))return 'pending';
  if(list.some(t=>t.status==='cooking'))return 'cooking';
  return 'ready';
}

function renderTables(){
  const q=(document.getElementById('search').value||'').trim();
  const el=document.getElementById('tables-scroll');

  const activeTables = {};
  tickets.filter(t=>!t.tableCleared).forEach(t=>{
    if(!activeTables[t.table]) activeTables[t.table]=[];
    activeTables[t.table].push(t);
  });

  let tableNums = Object.keys(activeTables).map(Number).sort((a,b)=>a-b);
  if(q) tableNums = tableNums.filter(n => String(n).includes(q));

  document.getElementById('s-tables').textContent = Object.keys(activeTables).length;
  document.getElementById('s-pending').textContent = tickets.filter(t=>!t.tableCleared && (t.status==='new'||t.status==='cooking')).length;
  document.getElementById('s-done').textContent = tickets.filter(t=>!t.tableCleared && t.status==='done').length;

  if(!tableNums.length){
    el.innerHTML = '<div class="no-tables"><div class="no-tables-icon">🧾</div>ยังไม่มีโต๊ะที่เปิดอยู่</div>';
    return;
  }

  el.innerHTML = tableNums.map(n => {
    const list = activeTables[n];
    const status = getTableStatus(list);
    const badgeText = status==='pending'?'มีรอทำ':status==='cooking'?'กำลังทำ':'พร้อมเสิร์ฟครบ';
    const badgeClass = status;

    const ordersHtml = list.map(t => {
      const stColor = t.status==='new'?'background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)':
                      t.status==='cooking'?'background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border)':
                      'background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)';
      const stText = t.status==='new'?'รอทำ':t.status==='cooking'?'กำลังทำ':'เสร็จแล้ว';
      return `<div class="order-block">
        <div class="ob-head">
          <span class="ob-num">#${t.num} · ${t.time}</span>
          <span class="ob-status" style="${stColor}">${stText}</span>
        </div>
        ${t.items.map(i=>`<div class="ob-item"><span>${i.name}</span><span class="ob-qty">×${i.qty}</span></div>`).join('')}
        ${t.note?`<div class="ob-note">📝 ${t.note}</div>`:''}
      </div>`;
    }).join('');

    return `<div class="table-card">
      <div class="tc-head">
        <div class="tc-name">โต๊ะ ${n}</div>
        <span class="tc-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="tc-orders">${ordersHtml}</div>
      <div class="tc-actions">
        <button class="tc-btn clear" onclick="clearTable(${n})">🧾 เช็กบิล / เคลียร์โต๊ะ</button>
      </div>
    </div>`;
  }).join('');
}

function clearTable(n){
  if(!confirm(`ยืนยันเช็กบิลและเคลียร์โต๊ะ ${n}?`))return;
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'clear_table',table:n}));
}

function exportExcel(){
  window.location.href = '/api/report/excel';
}

connect();
</script>
</body>
</html>
