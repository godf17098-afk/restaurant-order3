<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>พนักงาน – ออเดอร์</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=Kanit:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#f0f2f8;--muted:#8b90a8;
  --accent:#4f8ef7;--accent-dim:rgba(79,142,247,0.13);
  --green:#2dd4a0;--green-dim:rgba(45,212,160,0.13);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.13);
  --red:#f87171;--red-dim:rgba(248,113,113,0.13);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.brand{font-family:'Kanit',sans-serif;font-size:15px;font-weight:500;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.counters{display:flex;gap:6px}
.pill{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:500;white-space:nowrap}
.p-w{background:var(--amber-dim);color:var(--amber)}
.p-c{background:var(--accent-dim);color:var(--accent)}
.p-d{background:var(--green-dim);color:var(--green)}

/* TAB NAV */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:11px 4px;text-align:center;font-family:'Kanit',sans-serif;font-size:13px;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* PAGES */
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}

/* ORDER PAGE */
.table-scroll{padding:12px 12px 6px;flex-shrink:0}
.slabel{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.table-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tbl-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 4px;font-family:'Kanit',sans-serif;font-size:14px;cursor:pointer;text-align:center;transition:all .15s}
.tbl-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

.menu-scroll{flex:1;overflow-y:auto;padding:0 12px}
.menu-scroll::-webkit-scrollbar{display:none}
.cat-label{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;padding:10px 0 5px}
.menu-item{display:flex;align-items:center;padding:11px 10px;border-radius:10px;gap:8px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px}
.mdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mname{flex:1;font-size:14px;font-weight:500}
.mprice{font-size:13px;color:var(--muted);margin-right:6px}
.add-btn{width:30px;height:30px;background:var(--accent-dim);border:1px solid rgba(79,142,247,.3);border-radius:8px;color:var(--accent);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}

/* CART BAR */
.cart-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.cart-info{display:flex;align-items:center;gap:8px;flex:1}
.cart-count{background:var(--accent);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.cart-total{font-family:'Kanit',sans-serif;font-size:17px;font-weight:500}
.send-btn{background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Kanit',sans-serif;font-size:14px;font-weight:500;padding:10px 16px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.send-btn:disabled{opacity:.3;cursor:not-allowed}

/* KDS PAGE */
.kds-scroll{flex:1;overflow-y:auto;padding:12px}
.kds-scroll::-webkit-scrollbar{display:none}
.ticket{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ticket.s-new{border-top:2px solid var(--amber)}
.ticket.s-cooking{border-top:2px solid var(--accent)}
.ticket.s-done{border-top:2px solid var(--green);opacity:.55}
.t-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.t-table{font-family:'Kanit',sans-serif;font-size:16px;font-weight:500}
.t-sub{font-size:11px;color:var(--muted);margin-top:2px}
.t-right{text-align:right}
.t-time{font-size:11px;color:var(--muted);margin-top:3px}
.t-items{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px 0;margin-bottom:10px}
.t-item{display:flex;justify-content:space-between;font-size:14px;padding:3px 0}
.t-qty{color:var(--muted);font-size:13px}
.t-note{font-size:12px;color:var(--amber);padding:6px 8px;background:var(--amber-dim);border-radius:7px;margin-bottom:10px}
.src-badge{font-size:11px;padding:2px 7px;border-radius:999px;font-weight:500}
.src-staff{background:var(--accent-dim);color:var(--accent)}
.src-customer{background:var(--green-dim);color:var(--green)}
.t-actions{display:flex;gap:7px}
.act-btn{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Sarabun',sans-serif;font-size:13px;cursor:pointer;text-align:center}
.act-cook{border-color:rgba(79,142,247,.35);color:var(--accent)}
.act-done{border-color:rgba(45,212,160,.35);color:var(--green)}
.no-tickets{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

/* NOTE MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:18px 18px 0 0;padding:20px;width:100%;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Kanit',sans-serif;font-size:16px;font-weight:500;margin-bottom:12px;display:flex;justify-content:space-between}
.close-btn{background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
.order-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.order-item:last-child{border:none}
.oname{flex:1;font-size:14px}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-num{font-size:15px;font-weight:500;min-width:20px;text-align:center}
.note-input{width:100%;border:1px solid var(--border2);border-radius:9px;padding:9px 12px;font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text);background:var(--surface2);outline:none;margin:12px 0 10px;height:42px}
.note-input:focus{border-color:var(--accent)}
.note-input::placeholder{color:var(--muted)}
.confirm-btn{width:100%;background:var(--accent);border:none;border-radius:11px;color:#fff;font-family:'Kanit',sans-serif;font-size:15px;font-weight:500;padding:13px;cursor:pointer}
.modal-footer{display:flex;justify-content:space-between;align-items:center;padding:8px 0 4px}
.modal-total-label{font-size:13px;color:var(--muted)}
.modal-total-num{font-family:'Kanit',sans-serif;font-size:18px;font-weight:500}
.empty-text{font-size:13px;color:var(--muted);text-align:center;padding:16px 0}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><div class="dot"></div>พนักงาน</div>
  <div class="counters">
    <span class="pill p-w" id="cw">0 รอ</span>
    <span class="pill p-c" id="cc">0 ทำ</span>
    <span class="pill p-d" id="cd">0 เสร็จ</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('order',this)">🛒 รับออเดอร์</button>
  <button class="tab" onclick="showPage('kds',this)">🍳 ครัว (KDS)</button>
</div>

<!-- ORDER PAGE -->
<div class="page active" id="page-order">
  <div class="table-scroll">
    <div class="slabel">เลือกโต๊ะ</div>
    <div class="table-grid" id="table-grid"></div>
  </div>
  <div class="menu-scroll" id="menu-scroll"></div>
  <div class="cart-bar">
    <div class="cart-info">
      <div class="cart-count" id="cart-count">0</div>
      <div class="cart-total" id="cart-total">฿0</div>
    </div>
    <button class="send-btn" id="send-btn" onclick="openCart()" disabled>
      ดูตะกร้า →
    </button>
  </div>
</div>

<!-- KDS PAGE -->
<div class="page" id="page-kds">
  <div class="kds-scroll" id="kds-scroll">
    <div class="no-tickets">ยังไม่มีออเดอร์</div>
  </div>
</div>

<!-- CART MODAL -->
<div class="modal-overlay" id="modal" onclick="closeCartIfOutside(event)">
  <div class="modal">
    <div class="modal-title">
      ออเดอร์ – <span id="modal-table">โต๊ะ 1</span>
      <button class="close-btn" onclick="closeCart()">×</button>
    </div>
    <div id="modal-items"></div>
    <input class="note-input" id="note" placeholder="หมายเหตุ เช่น ไม่เผ็ด, ไม่ใส่ผักชี...">
    <div class="modal-footer">
      <div>
        <div class="modal-total-label">รวมทั้งหมด</div>
        <div class="modal-total-num" id="modal-total">฿0</div>
      </div>
      <button class="confirm-btn" style="width:auto;padding:11px 24px" onclick="sendOrder()">ส่งเข้าครัว →</button>
    </div>
  </div>
</div>

<script>
let menu=[], tickets=[], orders={}, currentTable=1, ws;

function connect(){
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = ()=>{};
  ws.onclose = ()=>setTimeout(connect,2000);
  ws.onmessage = (e)=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='init'){menu=msg.menu;tickets=msg.tickets;initMenu();renderKDS();updateCounts();}
    if(msg.type==='ticket_added'){tickets.unshift(msg.ticket);renderKDS();updateCounts();}
    if(msg.type==='ticket_updated'){const i=tickets.findIndex(t=>t.num===msg.ticket.num);if(i>=0)tickets[i]=msg.ticket;renderKDS();updateCounts();}
  };
}

function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}

function initTableGrid(){
  const el=document.getElementById('table-grid');
  el.innerHTML=Array.from({length:8},(_,i)=>i+1).map(n=>
    `<button class="tbl-btn ${n===1?'active':''}" onclick="selectTable(${n},this)">โต๊ะ ${n}</button>`
  ).join('');
}

function allItems(){return menu.flatMap(c=>c.items)}
function getItem(id){return allItems().find(x=>x.id==id)}

function initMenu(){
  const el=document.getElementById('menu-scroll');
  el.innerHTML=menu.map(cat=>`
    <div class="cat-label">${cat.cat}</div>
    ${cat.items.map(item=>`
      <div class="menu-item">
        <div class="mdot" style="background:${cat.color}"></div>
        <span class="mname">${item.name}</span>
        <span class="mprice">฿${item.price}</span>
        <button class="add-btn" onclick="addItem(${item.id})">+</button>
      </div>
    `).join('')}
  `).join('');
}

function selectTable(n, btn){
  currentTable=n;
  document.querySelectorAll('.tbl-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateCartBar();
}

function addItem(id){
  if(!orders[currentTable])orders[currentTable]={};
  orders[currentTable][id]=(orders[currentTable][id]||0)+1;
  updateCartBar();
}

function changeQty(id,d){
  if(!orders[currentTable])return;
  const next=(orders[currentTable][id]||0)+d;
  if(next<=0)delete orders[currentTable][id];else orders[currentTable][id]=next;
  updateCartBar();
  renderModalItems();
}

function updateCartBar(){
  const tbl=orders[currentTable]||{};
  const keys=Object.keys(tbl);
  const count=keys.reduce((s,id)=>s+tbl[id],0);
  let total=0;keys.forEach(id=>{const item=getItem(id);if(item)total+=item.price*tbl[id];});
  document.getElementById('cart-count').textContent=count;
  document.getElementById('cart-total').textContent='฿'+total.toLocaleString();
  document.getElementById('send-btn').disabled=count===0;
}

function openCart(){
  document.getElementById('modal-table').textContent='โต๊ะ '+currentTable;
  renderModalItems();
  document.getElementById('modal').classList.add('show');
}

function renderModalItems(){
  const tbl=orders[currentTable]||{};
  const keys=Object.keys(tbl);
  if(!keys.length){closeCart();return;}
  let total=0;
  document.getElementById('modal-items').innerHTML=keys.map(id=>{
    const item=getItem(id);const qty=tbl[id];total+=item.price*qty;
    return `<div class="order-item">
      <span class="oname">${item.name}</span>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('modal-total').textContent='฿'+total.toLocaleString();
}

function closeCart(){document.getElementById('modal').classList.remove('show');}
function closeCartIfOutside(e){if(e.target===document.getElementById('modal'))closeCart();}

function sendOrder(){
  const tbl=orders[currentTable]||{};
  const keys=Object.keys(tbl);
  if(!keys.length||!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({
    type:'new_order',table:currentTable,
    items:keys.map(id=>({id,name:getItem(id).name,qty:tbl[id]})),
    note:document.getElementById('note').value.trim(),
    source:'staff'
  }));
  delete orders[currentTable];
  document.getElementById('note').value='';
  closeCart();updateCartBar();
  showPage('kds',document.querySelectorAll('.tab')[1]);
}

function setStatus(num,status){
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'set_status',num,status}));
}

function renderKDS(){
  const el=document.getElementById('kds-scroll');
  if(!tickets.length){el.innerHTML='<div class="no-tickets">ยังไม่มีออเดอร์</div>';return;}
  el.innerHTML=tickets.map(t=>{
    const sb=t.status==='new'?`<span class="pill p-w">รอทำ</span>`:t.status==='cooking'?`<span class="pill p-c">กำลังทำ</span>`:`<span class="pill p-d">เสร็จ</span>`;
    const srcB=t.source==='customer'?`<span class="src-badge src-customer">ลูกค้า</span>`:`<span class="src-badge src-staff">พนักงาน</span>`;
    const act=t.status==='new'?`<button class="act-btn act-cook" onclick="setStatus(${t.num},'cooking')">▶ เริ่มทำ</button>`:t.status==='cooking'?`<button class="act-btn act-done" onclick="setStatus(${t.num},'done')">✓ เสร็จแล้ว</button>`:'';
    return `<div class="ticket s-${t.status}">
      <div class="t-hd">
        <div><div class="t-table">โต๊ะ ${t.table}</div><div class="t-sub">#${t.num} ${srcB}</div></div>
        <div class="t-right">${sb}<div class="t-time">${t.time}</div></div>
      </div>
      <div class="t-items">${t.items.map(i=>`<div class="t-item"><span>${i.name}</span><span class="t-qty">×${i.qty}</span></div>`).join('')}</div>
      ${t.note?`<div class="t-note">📝 ${t.note}</div>`:''}
      ${act?`<div class="t-actions">${act}</div>`:''}
    </div>`;
  }).join('');
}

function updateCounts(){
  document.getElementById('cw').textContent=tickets.filter(t=>t.status==='new').length+' รอ';
  document.getElementById('cc').textContent=tickets.filter(t=>t.status==='cooking').length+' ทำ';
  document.getElementById('cd').textContent=tickets.filter(t=>t.status==='done').length+' เสร็จ';
}

initTableGrid();connect();
</script>
</body>
</html>
